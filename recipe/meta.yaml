{% set repo   = "eman2" %}
{% set branch = "cf-fftw-openmpi" %}

{% set build  = 0 %}

package:
  name: eman-dev
  version: 2.31

source:
  url: https://github.com/cryoem/{{ repo }}/archive/{{ branch }}.tar.gz
  fn: {{ repo }}-{{ branch }}.tar.gz

build:
  number: {{ build }}
  string: openmpi{{ openmpi }}_{{ build }}  # [not win]
  skip: True  # [win32]

requirements:
  build:
    - cmake 3.14.*
    - {{ compiler('cxx') }}
    - {{ cdt('mesa-libgl-devel') }}      # [linux]
  
  host:
    - eman-deps 16.0.*  openmpi{{ openmpi }}_2  # [not win]
    - eman-deps 16.0.*  2                       # [win]
    - boost 1.66.*
    - libglu      # [linux]

test:
  requires:
    - eman-deps 16.0.*  openmpi{{ openmpi }}_2  # [not win]
    - eman-deps 16.0.*  2                       # [win]
    - boost 1.66.*
  
  source_files:
    - examples/mpi_test.py
    - programs/
    - tests/
    - rt/pyem/

  commands:
    - bash tests/run_tests.sh                                # [not win]
    - call tests\run_tests.bat                               # [win]

about:
  summary: Eman development package
