{% set repo   = "eman2" %}
{% set branch = "develop2" %}

package:
  name: eman-dev
  version: 2.31

source:
  url: https://github.com/cryoem/{{ repo }}/archive/{{ branch }}.tar.gz
  fn: {{ repo }}-{{ branch }}.tar.gz

build:
  number: 0
  skip: True  # [win32]

requirements:
  build:
    - cmake 3.14.*
    - {{ compiler('cxx') }}
    - {{ cdt('mesa-libgl-devel') }}      # [linux]
  
  host:
    - msinttypes  # [win]
    - python 2.7.14
    - boost 1.66.*
    - fftw-mpi
    - numpy          1.13.*
    - ftgl
    - freetype
    - gsl            2.4.*
    - hdf5 1.8.18
    - jpeg           9b
    - libtiff 4.0.9             # [not win]
    - libtiff 4.0.9 hafacce9_0  # [win]
    - libpng 1.6.34
    - zlib
    - libcxx         4.0.1  h579ed51_0  # [osx]
    - libglu      # [linux]

test:
  requires:
    - openmpi              # [not win]
    - eman-deps 16.0.*
    - boost 1.66.*
  
  source_files:
    - examples/mpi_test.py
    - programs/
    - tests/
    - rt/pyem/

  commands:
    - bash tests/run_tests.sh                                # [not win]
    - call tests\run_tests.bat                               # [win]

about:
  summary: Eman development package
